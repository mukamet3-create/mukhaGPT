<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>muka AI Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-main: #212121;
    --bg-side: #171717;
    --msg-bot: #2a2a2a;
    --msg-user: #3c3c3c;
  }
</style>
</head>
<body class="flex h-screen bg-[var(--bg-main)] text-white">

<aside class="hidden md:flex flex-col w-64 bg-[var(--bg-side)] p-4 gap-4">
  <h2 class="text-lg font-bold">Сохранённые чаты</h2>
  <div id="saved-chats" class="flex flex-col gap-2 overflow-y-auto"></div>
</aside>

<main class="flex flex-col flex-1">
<header class="bg-[var(--bg-side)] backdrop-blur-sm p-4 flex justify-between items-center sticky top-0">
  <h1 class="text-xl font-semibold">muka AI</h1>
  <select id="model-select" class="bg-[#2f2f2f] text-white rounded px-2 py-1">
    <option value="mistralai/Mistral-7B-Instruct-v0.3">Mistral 7B (HF)</option>
    <option value="microsoft/Phi-3-mini-4k-instruct">Phi-3 Mini (HF)</option>
  </select>
</header>

<div id="chat-window" class="flex-1 p-4 space-y-4 overflow-y-auto"></div>

<footer class="bg-[var(--bg-side)] p-4 flex items-center gap-3">
  <input id="message-input" class="flex-1 bg-[#2b2b2b] px-4 py-2 rounded focus:outline-none" placeholder="Напиши сообщение..."/>
  <button id="send-btn" class="bg-blue-600 px-4 py-2 rounded">Отправить</button>
  <button id="save-btn" class="text-sm text-gray-300">💾 Сохранить чат</button>
</footer>
</main>

<script>
// ВСТАВЛЕННЫЙ ТОКЕН
const HF_TOKEN = "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";

let chatHistory = [];
let savedChats = JSON.parse(localStorage.getItem("mukaSavedChats") || "[]");

function renderSavedChats() {
  const list = document.getElementById("saved-chats");
  list.innerHTML = "";
  savedChats.forEach((chat, i) => {
    const btn = document.createElement("button");
    btn.textContent = chat.name;
    btn.className = "bg-[#2b2b2b] p-2 rounded text-sm text-left hover:bg-gray-700";
    btn.onclick = () => loadChat(i);
    list.appendChild(btn);
  });
}

function loadChat(i) {
  chatHistory = [...savedChats[i].history];
  renderChat();
}

function renderChat() {
  const win = document.getElementById("chat-window");
  win.innerHTML = "";
  chatHistory.forEach(msg => {
    const div = document.createElement("div");
    div.className = msg.role === "user"
      ? "self-end bg-[var(--msg-user)] p-3 rounded-lg max-w-[80%] ml-auto"
      : "self-start bg-[var(--msg-bot)] p-3 rounded-lg max-w-[80%]";
    div.textContent = msg.content;
    win.appendChild(div);
  });
  win.scrollTop = win.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("message-input");
  const text = input.value.trim();
  const selectedModel = document.getElementById("model-select").value;
  
  if (!text) return;

  chatHistory.push({ role: "user", content: text });
  renderChat();
  input.value = "";

  try {
    const response = await fetch(`https://api-inference.huggingface.co{selectedModel}`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${HF_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: text,
        parameters: { return_full_text: false, max_new_tokens: 500 }
      })
    });

    const data = await response.json();
    
    // HF возвращает массив или объект с ошибкой
    let botText = "";
    if (Array.isArray(data)) {
        botText = data[0].generated_text || "Ответ пуст";
    } else {
        botText = data.error || "Ошибка API";
    }

    chatHistory.push({ role: "assistant", content: botText });
    renderChat();
  } catch (error) {
    console.error(error);
    chatHistory.push({ role: "assistant", content: "Произошла ошибка соединения." });
    renderChat();
  }
}

function saveCurrentChat() {
  if (chatHistory.length === 0) return;
  const name = prompt("Название для чата:", "Новый чат " + new Date().toLocaleTimeString());
  if (!name) return;
  savedChats.push({ name, history: [...chatHistory] });
  localStorage.setItem("mukaSavedChats", JSON.stringify(savedChats));
  renderSavedChats();
}

document.getElementById("send-btn").onclick = sendMessage;
document.getElementById("save-btn").onclick = saveCurrentChat;
document.getElementById("message-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

renderSavedChats();
</script>
</body>
</html>
